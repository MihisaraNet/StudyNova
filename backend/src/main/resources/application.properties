# =============================================
# Smart Student Study Planner - Spring Boot Config
# =============================================

# Server
server.port=8080

# MongoDB
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/studentplanner}
spring.data.mongodb.database=studentplanner

# JWT
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=86400000

# Gemini AI
gemini.api.key=${GEMINI_API_KEY:your_gemini_api_key_here}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent

# Logging
logging.level.com.studentplanner=DEBUG
logging.level.org.springframework.security=DEBUG

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
