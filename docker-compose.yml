version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: studynova-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - studynova-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studynova-backend
    ports:
      - "8080:8080"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/studentplanner
      - JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      - GEMINI_API_KEY=your_gemini_api_key_here
      - PORT=8080
    depends_on:
      - mongodb
    networks:
      - studynova-network

volumes:
  mongo-data:

networks:
  studynova-network:
    driver: bridge
